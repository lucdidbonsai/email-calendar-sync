<div id="email-detail-panel" class="email-detail-panel">

  <!-- Top bar: subject + close -->
  <div class="edp-top-bar">
    <div class="edp-top-bar-left">
      <div class="edp-top-bar-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="12" height="9" rx="1.5"/><path d="M1 5l6 4 6-4"/></svg>
      </div>
      <div class="edp-subject" id="edp-subject"></div>
    </div>
    <button class="edp-close-btn" onclick="closeEmailPanel()">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="1" y1="1" x2="10" y2="10"/><line x1="10" y1="1" x2="1" y2="10"/></svg>
    </button>
  </div>

  <!-- Thread scrollable area -->
  <div class="edp-body">
    <div class="edp-view-mode" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;">
      <div id="edp-body" class="edp-thread-list"></div>
      <!-- Internal notes display -->
      <div id="edp-comments-display" class="edp-comments-display"></div>
    </div>
  </div>

  <!-- Reply / Reply all / Forward action bar (view mode only) -->
  <div class="edp-action-bar" id="edp-action-bar">
    <button class="edp-action-bar-btn" onclick="openInlineComposer('reply')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>
      Reply
    </button>
    <button class="edp-action-bar-btn" onclick="openInlineComposer('replyall')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 17 2 12 7 7"/><polyline points="13 17 8 12 13 7"/><path d="M22 18v-2a4 4 0 0 0-4-4H2"/></svg>
      Reply all
    </button>
    <button class="edp-action-bar-btn" onclick="openInlineComposer('forward')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 17 20 12 15 7"/><path d="M4 18v-2a4 4 0 0 1 4-4h12"/></svg>
      Forward
    </button>
  </div>

  <!-- Inline composer (hidden by default, shown when composing) -->
  <div class="edp-inline-composer" id="edp-inline-composer" style="display:none;">

    <!-- Composer tabs: Reply / Reply all / Forward -->
    <div class="edp-ic-tabs">
      <button class="edp-ic-tab" id="edp-ic-tab-reply" onclick="openInlineComposer('reply')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>
        Reply
      </button>
      <button class="edp-ic-tab" id="edp-ic-tab-replyall" onclick="openInlineComposer('replyall')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 17 2 12 7 7"/><polyline points="13 17 8 12 13 7"/><path d="M22 18v-2a4 4 0 0 0-4-4H2"/></svg>
        Reply all
      </button>
      <button class="edp-ic-tab" id="edp-ic-tab-forward" onclick="openInlineComposer('forward')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 17 20 12 15 7"/><path d="M4 18v-2a4 4 0 0 1 4-4h12"/></svg>
        Forward
      </button>
    </div>

    <!-- From row -->
    <div class="edp-ic-field-row">
      <span class="edp-ic-to-label">From</span>
      <span class="edp-ic-from-value">Tom Bradley &lt;tom.bradley@catalystconsulting.io&gt;</span>
    </div>

    <!-- To row -->
    <div class="edp-ic-to-row">
      <span class="edp-ic-to-label">To</span>
      <div class="edp-ic-to-chips" id="edp-ic-to-chips"></div>
      <span class="edp-ic-ccbcc" onclick="toggleCcBcc()">Cc / Bcc</span>
    </div>

    <!-- Cc row (hidden by default) -->
    <div class="edp-ic-to-row edp-ic-cc-row" id="edp-ic-cc-row" style="display:none;">
      <span class="edp-ic-to-label">Cc</span>
      <input type="text" class="edp-ic-cc-input" placeholder="Add recipients…">
    </div>
    <!-- Bcc row (hidden by default) -->
    <div class="edp-ic-to-row edp-ic-bcc-row" id="edp-ic-bcc-row" style="display:none;">
      <span class="edp-ic-to-label">Bcc</span>
      <input type="text" class="edp-ic-bcc-input" placeholder="Add recipients…">
    </div>

    <!-- Body -->
    <div class="edp-ic-body-wrap">
      <div class="edp-ic-body" id="edp-ic-body" contenteditable="true" data-placeholder="Start typing your email…"></div>
      <div class="edp-quoted-toggle">⋯</div>
    </div>

    <!-- Attachments -->
    <div class="edp-ic-attachments" id="edp-ic-attachments"></div>

    <!-- Toolbar -->
    <div class="edp-ic-toolbar">
      <div class="edp-rt-right" style="display:flex;align-items:center;gap:6px;">
        <button class="edp-rt-send" id="edp-ic-send-btn" onclick="sendInlineReply()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1L1 5l4.5 2L8 12l4-11z"/><path d="M5.5 7L12 1"/></svg>
          Send
        </button>
        <button class="edp-ic-tool-btn" data-tooltip="Attach file" onclick="document.getElementById('edp-ic-file-input').click()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <input type="file" id="edp-ic-file-input" style="display:none;" onchange="handleIcAttachment(this)" multiple>
        <button class="edp-ic-tool-btn" data-tooltip="Insert link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </button>
        <button class="edp-ic-tool-btn" data-tooltip="Insert image">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>
        <button class="edp-ic-tool-btn" data-tooltip="Emoji">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        </button>
        <div style="width:1px;height:18px;background:var(--border-content);margin:0 2px;flex-shrink:0;"></div>
        <button class="edp-ic-tool-btn edp-ic-tool-btn--discard" data-tooltip="Delete draft" onclick="discardInlineComposer()">
          <svg width="13" height="14" viewBox="0 0 13 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3.5h11"/><path d="M4.5 3.5V2h4v1.5"/><rect x="2" y="3.5" width="9" height="9" rx="1"/><path d="M5 6.5v3.5"/><path d="M8 6.5v3.5"/></svg>
        </button>
      </div>
    </div>
  </div>

</div>
